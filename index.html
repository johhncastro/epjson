<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP JSON</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-dark">
    <header class="header">
        <div class="header-left">
            <h1 class="title">EP JSON</h1>
        </div>
        <div class="header-right">
            <button id="theme-toggle" class="btn btn-icon" title="Toggle theme" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </header>

    <main class="hub-main">
        <section class="hub-hero">
            <h2>Privacy-first developer tools</h2>
            <p>Pick a tool. Everything runs locally in your browser.</p>
        </section>

        <section class="hub-grid" aria-label="Available tools">
            <a class="hub-card" href="/json.html" aria-label="Open JSON Formatter">
                <h3>JSON Formatter</h3>
                <p>Beautify, minify, validate, query, and diff JSON data.</p>
            </a>
            <a class="hub-card" href="/jwt.html" aria-label="Open JWT Decoder">
                <h3>JWT Decoder</h3>
                <p>Decode bearer tokens locally and inspect header, payload, and signature.</p>
            </a>
        </section>
    </main>

    <footer class="footer"></footer>

    <script src="theme.js"></script>
    <script>
        window.EPTheme.init();
    </script>
</body>
</html>
